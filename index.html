<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Clipboard</title>
    <style>
        :root {
            --bg: #f4f4f5;      /* Light gray background */
            --card: #ffffff;    /* Pure white cards */
            --text: #000000;    /* Black text */
            --primary: #2563eb; /* Blue button */
            --primary-hover: #1d4ed8;
            --success: #10b981; /* Green success */
            --border: #000000;  /* Thin black border */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h2 {
            margin: 0;
            color: var(--text);
        }
        button.refresh-btn {
            background-color: transparent;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        button.refresh-btn:active {
            background-color: #e4e4e7;
        }
        textarea {
            width: 100%;
            height: 120px;
            background-color: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px; /* Square corners */
            padding: 15px;
            font-size: 16px;
            font-family: monospace;
            resize: none;
            box-sizing: border-box;
        }
        textarea:focus {
            outline: none;
            border-width: 2px;
            border-color: var(--primary);
        }
        button.send-btn {
            background-color: var(--primary);
            color: white;
            border: 1px solid var(--border);
            padding: 14px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.send-btn:active {
            transform: scale(0.98);
            background-color: var(--primary-hover);
        }
        .messages {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .message-card {
            background-color: var(--card);
            padding: 15px;
            border-radius: 4px; /* Square corners */
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid var(--border); /* Thin black border */
            overflow-wrap: break-word;
            word-wrap: break-word;
        }
        .message-text {
            font-family: monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        button.copy-btn {
            background-color: #f4f4f5;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        button.copy-btn.copied {
            background-color: var(--success);
            color: white;
            border-color: var(--success);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-row">
            <h2>Live Clipboard</h2>
            <button class="refresh-btn" onclick="fetchHistory()">↻ Refresh</button>
        </div>
        
        <textarea id="inputBox" placeholder="Paste text here... (Press Enter to send)"></textarea>
        <button class="send-btn" onclick="sendText()">Send to Devices</button>
        <div class="messages" id="messagesList"></div>
    </div>

    <script>
        // Unique channel ID.
        const channel = "shafeek_private_clip_8842"; 
        const serverUrl = "https://ntfy.sh/" + channel;

        // 1. Fetch missed messages (History)
        async function fetchHistory() {
            const btn = document.querySelector('.refresh-btn');
            btn.innerText = "Syncing...";
            
            try {
                const res = await fetch(serverUrl + "/json?poll=1");
                const text = await res.text();
                const lines = text.trim().split('\n');
                
                document.getElementById('messagesList').innerHTML = ''; // Clear board
                
                const messages = [];
                for (let line of lines) {
                    if(!line) continue;
                    const data = JSON.parse(line);
                    if(data.event === "message" && data.message) {
                        messages.push(data.message);
                    }
                }
                // Render newest at top
                messages.reverse().forEach(addMessageToUI);
            } catch (e) {
                console.error("Fetch error", e);
            }
            btn.innerText = "↻ Refresh";
        }

        // 2. Listen for real-time messages when app is open
        const eventSource = new EventSource(serverUrl + "/sse");
        eventSource.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.event === "message" && data.message) {
                // Only add it if we are looking at the page so we don't duplicate history
                if (document.visibilityState === 'visible') {
                    addMessageToUI(data.message);
                }
            }
        };

        // 3. Send message
        async function sendText() {
            const btn = document.querySelector('.send-btn');
            const inputBox = document.getElementById('inputBox');
            const text = inputBox.value.trim();
            
            if (!text) return;

            btn.innerText = "Sending...";
            
            await fetch(serverUrl, { method: 'POST', body: text });

            inputBox.value = '';
            btn.innerText = "Send to Devices";
        }

        // 4. Enter to Send feature
        document.getElementById('inputBox').addEventListener('keydown', function(e) {
            // If user presses Enter AND is NOT holding down the Shift key
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Stop it from making a new line
                sendText();         // Fire the message
            }
        });

        // 5. Auto-fetch when returning to the app from WhatsApp
        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "visible") {
                fetchHistory();
            }
        });

        // 6. Build the UI Card
        function addMessageToUI(text) {
            const list = document.getElementById('messagesList');
            const card = document.createElement('div');
            card.className = 'message-card';

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            textDiv.innerText = text;

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerText = 'Copy';
            
            copyBtn.onclick = () => {
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.innerText = 'Copied!';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.innerText = 'Copy';
                        copyBtn.classList.remove('copied');
                    }, 2000);
                });
            };

            card.appendChild(textDiv);
            card.appendChild(copyBtn);
            list.prepend(card); 
        }

        // Initial load
        fetchHistory();
    </script>
</body>
</html>
